<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnatchIMG</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=20260703n" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=20260703n" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png?v=20260703n" />
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("snatchimgTheme") || "dark";
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=20260703u" />
  </head>
  <body>
    <main class="app-shell">
      <header class="brand">
        <img class="brand-mark" src="/static/snatchicon.png?v=20260703u" alt="" aria-hidden="true" />

        <div class="brand-copy">
          <h1>Snatch<span>IMG</span></h1>
          <p>Download Images Automatically From Any Online Gallery</p>
        </div>
      </header>

      <section class="command-panel" aria-label="Snatch images">
        <div class="url-field">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.6 13.4a5 5 0 0 0 7.1 0l2.1-2.1a5 5 0 0 0-7.1-7.1l-1.2 1.2" />
            <path d="M13.4 10.6a5 5 0 0 0-7.1 0l-2.1 2.1a5 5 0 0 0 7.1 7.1l1.2-1.2" />
          </svg>
          <input id="urlInput" type="url" placeholder="Paste website URL here..." autocomplete="url" />
        </div>

        <button class="primary-action" id="snatchButton" type="button" title="Snatch images">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v12" />
            <path d="m7 10 5 5 5-5" />
            <path d="M5 18v3h14v-3" />
          </svg>
          <span>Snatch Images</span>
        </button>

        <button class="icon-button is-collapsed" id="detailsToggleButton" type="button" title="Show options and progress log" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 15 6-6 6 6" />
          </svg>
        </button>

        <button class="theme-toggle" id="themeToggleButton" type="button" title="Turn dark mode on" aria-label="Turn dark mode on" aria-pressed="false">
          <svg class="theme-toggle-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.9 4.9 1.4 1.4" />
            <path d="m17.7 17.7 1.4 1.4" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m4.9 19.1 1.4-1.4" />
            <path d="m17.7 6.3 1.4-1.4" />
          </svg>
          <svg class="theme-toggle-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 14.5A7.8 7.8 0 0 1 9.5 4a8.2 8.2 0 1 0 10.5 10.5z" />
          </svg>
        </button>
      </section>

      <div class="details-panel is-hidden" id="detailsPanel">
        <section class="options-panel" id="optionsPanel" aria-label="Options">
          <label>
            <span>Max pages</span>
            <input id="maxPagesInput" type="number" min="1" value="200" />
          </label>
          <label class="toggle">
            <input id="deepInput" type="checkbox" checked />
            <span>Deep</span>
          </label>
          <label class="toggle">
            <input id="linksOnlyInput" type="checkbox" checked />
            <span>Links only</span>
          </label>
        </section>
      </div>

      <section class="progress-section" aria-label="Download progress">
        <div class="status-line">
          <div class="status-icon" id="statusIcon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <strong id="phaseText">Waiting...</strong>
        </div>

        <div class="meter-row">
          <div class="meter">
            <span id="meterFill"></span>
          </div>
          <span class="meter-count" id="countText">
            <span class="file-count">0 / 0 Files</span>
            <span class="percent-pill">0%</span>
          </span>
        </div>
      </section>

      <section class="log-section is-hidden" id="logSection" aria-label="Progress log">
        <div class="log-header">
          <div>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 6h8M8 10h8M8 14h5" />
              <path d="M5 3h14v18H5z" />
            </svg>
            <strong>Progress log</strong>
          </div>
          <button id="clearLogButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M6 6l1 15h10l1-15" />
            </svg>
            <span>Clear log</span>
          </button>
        </div>

        <div class="log-box" id="logBox">
          <p class="muted">Ready.</p>
        </div>
      </section>

      <section class="download-section" aria-label="Download ZIP">
        <a class="zip-button is-disabled" id="zipButton" href="#" aria-disabled="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v12" />
            <path d="m7 10 5 5 5-5" />
            <path d="M5 18v3h14v-3" />
          </svg>
          <span>DOWNLOAD ZIP</span>
        </a>
      </section>
    </main>

    <footer>SnatchIMG @2026. All Rights Reserved Hexazon</footer>

    <script src="/static/app.js?v=20260703u"></script>
  </body>
</html>
